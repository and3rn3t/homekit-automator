# SwiftLint Configuration for HomeKit Automator
# Run: swiftlint lint --config .swiftlint.yml
# Note: CI runs with --strict, so warnings become errors.

# Paths to include/exclude
included:
  - scripts/swift/Sources
  - scripts/swift/Tests

excluded:
  - scripts/swift/.build
  - scripts/swift/Sources/HomeKitHelper/HomeKitHelper.xcodeproj
  - "**/.build"

# Rules configuration
disabled_rules:
  - trailing_comma           # Allow trailing commas in multiline collections
  - opening_brace            # Swift 6 style preferences differ
  - identifier_name          # HomeKit uses unconventional names (e.g., HMHome)
  - blanket_disable_command  # Allow file-level swiftlint:disable for tests

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - first_where
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Rule configuration
# Note: With --strict, warnings become errors. Set warning == error
# so only truly over-limit code fails CI.
line_length:
  warning: 150
  error: 150
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 500
  error: 500

file_length:
  warning: 1000
  error: 1000

function_body_length:
  warning: 100
  error: 100

function_parameter_count:
  warning: 8
  error: 8

cyclomatic_complexity:
  warning: 25
  error: 25

large_tuple:
  warning: 4
  error: 4

nesting:
  type_level: 3
  function_level: 5

# Custom rules
custom_rules:
  mark_comment_spacing:
    name: "MARK Comment Spacing"
    regex: "// MARK:[^ ]"
    message: "Add a space after 'MARK:'"
    severity: warning

reporter: "xcode"