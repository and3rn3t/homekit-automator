name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.1'

      - name: Build CLI (Debug)
        run: swift build
        working-directory: scripts/swift

      - name: Build CLI (Release)
        run: swift build -c release
        working-directory: scripts/swift

      - name: Run Swift Tests
        run: swift test
        working-directory: scripts/swift

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run MCP Server Tests
        run: npm test
        working-directory: scripts/mcp-server

      - name: Check Models.swift Sync
        run: ./scripts/sync-models.sh

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint Check
        run: swiftlint lint --config .swiftlint.yml --reporter github-actions-logging --strict

  xcode-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate HomeKitHelper Xcode Project
        working-directory: scripts/swift/Sources/HomeKitHelper
        run: |
          export HOMEKIT_TEAM_ID="PLACEHOLDER"
          xcodegen generate --quiet

      - name: Build HomeKitHelper (No Code Sign)
        working-directory: scripts/swift/Sources/HomeKitHelper
        run: |
          xcodebuild \
            -project HomeKitHelper.xcodeproj \
            -scheme HomeKitHelper \
            -configuration Debug \
            -destination "platform=macOS,variant=Mac Catalyst" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet || echo "::warning::HomeKitHelper build failed (expected without entitlements)"
