name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.1'

      - name: Build CLI (Release — arm64)
        run: swift build -c release --disable-sandbox --arch arm64
        working-directory: scripts/swift

      - name: Build CLI (Release — x86_64)
        run: swift build -c release --disable-sandbox --arch x86_64
        working-directory: scripts/swift

      - name: Create Universal Binary
        run: |
          lipo -create \
            scripts/swift/.build/arm64-apple-macosx/release/homekitauto \
            scripts/swift/.build/x86_64-apple-macosx/release/homekitauto \
            -output scripts/swift/.build/release/homekitauto-universal
          file scripts/swift/.build/release/homekitauto-universal

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run Tests
        run: swift test
        working-directory: scripts/swift

      - name: Prepare Release Artifacts
        run: |
          mkdir -p release-artifacts

          # CLI binary (universal)
          cp scripts/swift/.build/release/homekitauto-universal release-artifacts/homekitauto

          # MCP server
          mkdir -p release-artifacts/mcp-server
          cp scripts/mcp-server/index.js release-artifacts/mcp-server/
          cp scripts/mcp-server/package.json release-artifacts/mcp-server/

          # OpenClaw plugin
          cp scripts/openclaw-plugin/plugin.json release-artifacts/

          # Documentation
          cp -r docs release-artifacts/
          cp README.md release-artifacts/

          # Create tarball (universal)
          cd release-artifacts
          tar -czf ../homekit-automator-${GITHUB_REF_NAME}-macos-universal.tar.gz .
          cd ..

          # Create zip (universal)
          cd release-artifacts
          zip -r ../homekit-automator-${GITHUB_REF_NAME}-macos-universal.zip .
          cd ..

      - name: Generate Release Notes
        id: release_notes
        run: |
          echo "## HomeKit Automator ${GITHUB_REF_NAME}" > release-notes.md
          echo "" >> release-notes.md
          echo "### Installation" >> release-notes.md
          echo "" >> release-notes.md
          echo "#### Via Homebrew" >> release-notes.md
          echo '```bash' >> release-notes.md
          echo "brew tap and3rn3t/homekit-automator" >> release-notes.md
          echo "brew install homekit-automator" >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          echo "#### Manual Install" >> release-notes.md
          echo "1. Download the tarball or zip below" >> release-notes.md
          echo "2. Extract and copy \`homekitauto\` to a directory in your PATH" >> release-notes.md
          echo "3. Build and install the HomeKitHelper app (see docs/setup.md)" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Included Artifacts" >> release-notes.md
          echo "- \`homekitauto\` — CLI binary (macOS universal arm64+x86_64)" >> release-notes.md
          echo "- \`mcp-server/\` — MCP server for AI agent integration" >> release-notes.md
          echo "- \`plugin.json\` — OpenClaw plugin manifest" >> release-notes.md
          echo "- \`docs/\` — Documentation (skill, setup, references)" >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            homekit-automator-${{ github.ref_name }}-macos-universal.tar.gz
            homekit-automator-${{ github.ref_name }}-macos-universal.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Update Homebrew Formula
        run: |
          ./scripts/update-formula.sh "${{ github.ref_name }}"
          if git diff --quiet Formula/; then
            echo "Formula unchanged"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b update-formula-${{ github.ref_name }}
            git add Formula/homekit-automator.rb
            git commit -m "Update Homebrew formula for ${{ github.ref_name }}"
            git push origin update-formula-${{ github.ref_name }}
            echo "::notice::Formula updated on branch update-formula-${{ github.ref_name }}. Create a PR to merge."
          fi
